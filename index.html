<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css">
    
</head>
<body>
    <div class="outer-border">
    <h1 class="text-center" style="color: white">Calculator</h1>
    <div class="container items-center flex flex-col bg-red mx-auto m-w-20">
        <div class="row">
            <input type="text" class="input">
        </div>
        
        <div class="row">
            <button class="button btn-color-top">C</button>
            <button class="button btn-color-top">%</button>
            <button class="button btn-color-top">M+</button>
            <button class="button btn-color">M-</button>
            </div>

        <div class="row">
        <button class="button dark-grey">7</button>
        <button class="button dark-grey">8</button>
        <button class="button dark-grey">9</button>
        <button class="button btn-color">*</button>
        </div>


        <div class="row">
            <button class="button dark-grey">4</button>
            <button class="button dark-grey">5</button>
            <button class="button dark-grey">6</button>
            <button class="button btn-color">/</button>
            </div>

            <div class="row">
                <button class="button dark-grey">1</button>
                <button class="button dark-grey">2</button>
                <button class="button dark-grey">3</button>
                <button class="button btn-color">+</button>
                </div>

                <div class="row">
                    <button class="button dark-grey">0</button>
                    <button class="button dark-grey">.</button>
                    <button class="button dark-grey">=</button>
                    <button class="button btn-color">-</button>
                    </div>
    </div>
</div>
</body>
</html>
<script src="calculator.js"></script>
